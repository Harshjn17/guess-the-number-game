<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess the Number</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>I am thinking of a number between 1-100.<br>Can you guess it?</h2>

    <input type="number" id="guessInput" placeholder="Num" min="1" max="100">

    <button id="guessBtn">GUESS</button>
    
    <p id="hint"></p>
    <p id="after">No. Of Guesses: <span id="guess">0</span></p>
  </div>
  <script src="script.js"></script>
</body>
</html>
